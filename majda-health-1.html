<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ماجدة 🌿 - رحلة الصحة مع د. ميرنا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #4ade80; --teal: #2dd4bf; --lime: #a3e635;
  --bg: #061410; --card: #0d1f1a; --card2: #0e2218;
  --border: #1f4d3a; --text: #f0fdf4; --sub: #a7c4b5; --muted: #5c8a70;
}
body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; direction: rtl; min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
#content { flex: 1; overflow-y: auto; padding: 14px 14px 95px; transition: opacity 0.15s; }
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; background: #071210;
  border-top: 1px solid #1f4d3a; display: flex; z-index: 50;
}
.nav-btn {
  flex: 1; padding: 10px 4px 6px; background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 10px; font-weight: 600; border-top: 2px solid transparent;
  transition: all 0.2s; font-family: 'Cairo', sans-serif;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.nav-btn.active { color: var(--green); border-top-color: var(--green); font-weight: 800; }
.nav-btn .ni { font-size: 20px; }
.card {
  background: var(--card); border-radius: 16px; padding: 16px;
  margin-bottom: 12px; border: 1px solid var(--border);
}
.hero {
  background: linear-gradient(135deg,#042b1a,#065f46,#064e3b);
  border-radius: 20px; padding: 18px; margin-bottom: 14px; position: relative; overflow: hidden;
}
.hb1 { position:absolute;top:-20px;left:-20px;width:110px;height:110px;background:#4ade8012;border-radius:50%; }
.hb2 { position:absolute;bottom:-25px;right:-10px;width:75px;height:75px;background:#2dd4bf10;border-radius:50%; }
.btn-green {
  width:100%;background:linear-gradient(135deg,#065f46,#16a34a);border:none;border-radius:14px;
  padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  box-shadow:0 4px 18px #4ade8030; margin-bottom:10px;
}
.btn-teal {
  width:100%;background:linear-gradient(135deg,#0f4c75,#0891b2);border:none;border-radius:14px;
  padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  box-shadow:0 4px 18px #2dd4bf30; margin-bottom:10px;
}
.btn-wa {
  width:100%;background:linear-gradient(135deg,#065f46,#16a34a);border:none;border-radius:14px;
  padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  box-shadow:0 4px 18px #22c55e30; margin-bottom:10px; text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.progress-ring { position:relative;flex-shrink:0; }
.progress-ring svg { transform:rotate(-90deg); }
.progress-ring .rl { position:absolute;inset:0;display:flex;align-items:center;justify-content:center; }
.modal-overlay {
  position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;
  justify-content:center;z-index:100;padding:20px;
}
.modal-box { background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:320px;border:1px solid var(--border); }
.modal-title { font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;text-align:center; }
.modal-input {
  width:100%;background:#0d2b1f;border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;color:var(--text);font-size:18px;font-family:'Cairo',sans-serif;
  text-align:center;outline:none;margin-bottom:12px;
}
.modal-btns { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
.btn-cancel { padding:12px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--sub);cursor:pointer;font-family:'Cairo',sans-serif; }
.btn-save { padding:12px;border-radius:10px;border:none;background:var(--green);color:#052e16;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif; }
.share-modal-overlay {
  position:fixed;inset:0;background:#000000dd;display:flex;align-items:flex-end;
  justify-content:center;z-index:200;
}
.share-modal-box {
  background:#071210;border-radius:24px 24px 0 0;padding:22px;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border-top:1px solid var(--border);
}
.share-report {
  background:var(--card);border-radius:14px;padding:14px;font-size:13px;color:#dcfce7;
  line-height:1.9;white-space:pre-wrap;direction:rtl;text-align:right;
  font-family:'Cairo',sans-serif;margin-bottom:14px;border:1px solid #4ade8020;
}
.toast {
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#052e16;padding:10px 24px;border-radius:50px;
  font-weight:700;font-size:14px;font-family:'Cairo',sans-serif;z-index:300;
  box-shadow:0 4px 20px #4ade8050;opacity:0;transition:opacity 0.3s;
}
.toast.show { opacity:1; }
.week-title {
  background:linear-gradient(135deg,#042b1a,#065f46);
  border-radius:12px;padding:10px 14px;margin-bottom:10px;
  font-size:14px;font-weight:800;color:#dcfce7;
  display:flex;align-items:center;gap:8px;
}
.day-card { background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden; }
.day-header {
  width:100%;background:none;border:none;padding:14px 16px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;font-family:'Cairo',sans-serif;

.meal-row { padding:10px 16px;border-bottom:1px solid #0d2b1f; }
.meal-label { font-size:11px;font-weight:700;margin-bottom:4px; }
.meal-items { font-size:13px;color:var(--sub);line-height:1.6; }
.meal-item { display:flex;align-items:center;gap:6px;padding:2px 0; }
.done-btn {
  width:100%;margin-top:12px;padding:11px;border-radius:12px;border:2px solid;
  font-size:13px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  transition:all 0.2s;
}
.done-btn.undone { background:transparent;border-color:var(--border);color:var(--muted); }
.done-btn.done { background:linear-gradient(135deg,#166534,#15803d);border-color:#22c55e;color:#fff; }
.check-item {
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid #0d2b1f;cursor:pointer;transition:background 0.2s;
}
.check-item:active { background:#0d2b1f; }
.check-circle {
  width:28px;height:28px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  flex-shrink:0;transition:all 0.2s;
}
.check-circle.done { background:var(--green);border-color:var(--green); }
.check-label { font-size:14px;color:var(--sub); }
.check-label.done { color:#dcfce7;font-weight:600; }
.water-grid { display:flex;flex-wrap:wrap;gap:8px;justify-content:center; }
.water-cup {
  width:38px;height:52px;border-radius:6px;border:none;cursor:pointer;
  font-size:20px;transition:all 0.2s;background:var(--border);
}
.water-cup.filled { background:linear-gradient(180deg,#86efac,#22c55e);transform:scale(1.05);box-shadow:0 0 10px #4ade8040; }
.mot-card {
  background:linear-gradient(135deg,#052e16,#166534);
  border-radius:14px;padding:16px;margin-bottom:12px;text-align:center;
  border:1px solid #4ade8040;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn 0.3s ease forwards; }
.hidden { display:none !important; }
.snack-tag {
  display:inline-block;background:#0d2b1f;border:1px solid var(--border);
  border-radius:20px;padding:3px 10px;font-size:11px;color:var(--sub);margin:2px;
}
.grid2 { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
</style>
</head>
<body>
<div id="app">

  </div>
</div>

      <button class="btn-save" style="background:var(--teal);color:#fff;" onclick="logMeasurement()">حفظ ✓</button>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div id="shareModal" class="share-modal-overlay hidden" onclick="handleShareOverlay(event)">

</div>

function todayKey() { return new Date().toISOString().slice(0,10); }
function loadData() { try { return JSON.parse(localStorage.getItem('majda_v1')||'{}'); } catch{return{};} }
function saveData(d) { try { localStorage.setItem('majda_v1',JSON.stringify(d)); } catch{} }
let D = loadData();

function getToday() {
  if(!D[todayKey()]) D[todayKey()]={};
  return D[todayKey()];
}
function updateToday(patch) {
  D[todayKey()]={...getToday(),...patch};
  saveData(D); render();
}
function getStreak() {
  let s=0, d=new Date();
  while(true){ const k=d.toISOString().slice(0,10); if(D[k]?.completed){s++;d.setDate(d.getDate()-1);}else break; }
  return s;
}
function calcBMI(w,h){ return (w/((h/100)**2)).toFixed(1); }

function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));

  c.style.opacity='0';
  setTimeout(()=>{ render(); c.style.opacity='1'; },150);
}

function render() {
  const c=document.getElementById('content');
  switch(currentTab){
    case 'home': c.innerHTML=renderHome(); break;
    case 'plan': c.innerHTML=renderPlan(); break;
    case 'exercise': c.innerHTML=renderExercise(); break;
    case 'progress': c.innerHTML=renderProgress(); break;
  }
}

function ring(pct,size=72,stroke=7,color='#4ade80',label='') {
  const r=(size-stroke)/2, circ=2*Math.PI*r, off=circ-(pct/100)*circ;
  return `<div class="progress-ring" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1f4d3a" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}"
        stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
        stroke-linecap="round" style="transition:stroke-dashoffset 0.6s;transform:rotate(-90deg);transform-origin:center;"/>
    </svg>
    <div class="rl" style="font-size:12px;font-weight:800;color:${color};">${label}</div>
  </div>`;
}

          style="background:${sel?'linear-gradient(135deg,#052e16,#166534)':'var(--card)'};border:2px solid ${sel?'#4ade80':'var(--border)'};border-radius:14px;padding:14px;cursor:pointer;text-align:center;font-family:'Cairo',sans-serif;transition:all 0.2s;">
          <div style="font-size:30px;margin-bottom:6px;">${ex.emoji}</div>
          <div style="font-size:13px;font-weight:700;color:${sel?'#dcfce7':'var(--text)'};">${ex.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px;">${ex.dur}</div>
          ${sel?`<div style="font-size:11px;color:var(--green);margin-top:6px;font-weight:700;">~${ex.cal} سعرة 🔥</div>`:''}
        </button>`;
      }).join('')}
    </div>

    <div class="card">
      <div style="font-size:14px;font-weight:700;color:#fbbf24;margin-bottom:10px;">📅 خطة الأسابيع الأربعة</div>
      ${WEEKS_EX.map((we,i)=>`
        <div style="padding:10px 0;border-bottom:1px solid #0d2b1f;">
          <div style="font-size:13px;font-weight:700;color:#4ade80;margin-bottom:5px;">${we.label}</div>
          ${we.items.map(ex=>`<div style="font-size:12px;color:var(--sub);padding:2px 0;">${ex.emoji} ${ex.name} — ${ex.dur}</div>`).join('')}
        </div>`).join('')}
    </div>

    <div class="card">
      <div style="font-size:14px;font-weight:700;color:#fbbf24;margin-bottom:10px;">📝 ملاحظة الرياضة</div>
      <textarea style="width:100%;background:#0d2b1f;border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;text-align:right;outline:none;resize:none;" rows="3"
        placeholder="كيف كانت رياضتك اليوم؟ 🌿" oninput="setExNote(this.value)">${t.exNote||''}</textarea>
    </div>

    <button class="btn-green" onclick="shareExercise()">📤 شاركي رياضتك مع د. ميرنا</button>
  </div>`;
}

// ── PROGRESS ──────────────────────────────────────

function renderProgress() {
  const weights=D._weights||[];
  const measurements=D._measurements||[];
  const lw=weights.length?weights[weights.length-1].weight:START_WEIGHT;
  const bmi=calcBMI(lw,HEIGHT_CM);
  const lost=Math.max(0,+(START_WEIGHT-lw).toFixed(1));
  const toGo=Math.max(0,+(lw-GOAL_WEIGHT).toFixed(1));
  const pct=Math.min(100,Math.round((lost/TOTAL_TO_LOSE)*100));

  let chart='<div style="text-align:center;color:var(--muted);padding:20px 0;">سجّلي وزنك يومياً لرؤية المنحنى 🌿</div>';
  if(weights.length>1){
    const vals=weights.map(w=>w.weight);
    const mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5;
    const W=Math.max(weights.length-1,1)*60;
    const pts=vals.map((v,i)=>`${i*60},${90-((v-mn)/(mx-mn))*80}`).join(' ');
    const dots=vals.map((v,i)=>{const x=i*60,y=90-((v-mn)/(mx-mn))*80;return `<circle cx="${x}" cy="${y}" r="4" fill="#4ade80"/><text x="${x}" y="${y-8}" text-anchor="middle" font-size="10" fill="#86efac">${v}</text>`;}).join('');
    const dts=weights.map(w=>`<div style="font-size:9px;color:var(--muted);">${w.date.slice(5)}</div>`).join('');
    chart=`<div style="height:100px;margin-bottom:8px;overflow-x:auto;"><svg width="100%" height="100" viewBox="0 0 ${W} 100" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>${dots}</svg></div><div style="display:flex;justify-content:space-between;">${dts}</div>`;
  }

  return `<div class="fade-in">
    <div style="margin-bottom:14px;">
      <div style="font-size:16px;font-weight:800;">📊 تتبّع تقدمك</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">رحلتك من ${START_WEIGHT} إلى ${GOAL_WEIGHT} كغ 💚</div>
    </div>

    <div class="grid2" style="margin-bottom:12px;">
      ${[['الوزن الحالي',lw+' كغ','#fbbf24'],['BMI',bmi,'#2dd4bf'],['خسرتِ',lost+' كغ','#4ade80'],['الهدف الباقي',toGo+' كغ','#86efac']].map(([l,v,c])=>`
        <div class="card" style="margin-bottom:0;text-align:center;">
          <div style="font-size:20px;font-weight:900;color:${c};">${v}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px;">${l}</div>
        </div>`).join('')}
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <div style="font-size:12px;color:var(--muted);">${START_WEIGHT} كغ</div>
        <div style="font-size:14px;font-weight:700;color:var(--green);">${pct}% 🎯</div>
        <div style="font-size:12px;color:var(--muted);">${GOAL_WEIGHT} كغ</div>
      </div>
      <div style="height:10px;background:#0d2b1f;border-radius:10px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#065f46,#4ade80);border-radius:10px;transition:width 0.6s;"></div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:12px;">📈 منحنى الوزن</div>
      ${chart}
      <button onclick="openWeightModal()" style="width:100%;background:#4ade8020;border:1px solid #4ade8040;color:var(--green);border-radius:10px;padding:10px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;margin-top:8px;">
        ⚖️ أضيفي وزن اليوم
      </button>
    </div>

    <div class="card" style="border-color:#4ade8020;">
      <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px;">📏 القياسات الأساسية الابتدائية</div>
      ${[['الوزن','87.4 كغ','#fbbf24'],['الطول','166 سم','#2dd4bf'],['العمر','24 سنة','#86efac'],['الهدف','66 كغ','#4ade80'],['BMI الابتدائي',calcBMI(87.4,166),'#a3e635']].map(([l,v,c])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #0d2b1f;">
          <span style="font-size:13px;color:var(--sub);">${l}</span>
          <span style="font-size:14px;font-weight:800;color:${c};">${v}</span>
        </div>`).join('')}
    </div>

    <button class="btn-teal" onclick="openMeasureModal()">📏 إضافة قياسات الأسبوع</button>

    ${measurements.slice().reverse().map(m=>`
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${m.date}</div>
        <div class="grid2">
          ${[['الوزن',m.weight,'كغ'],['الخصر',m.waist,'سم'],['الورك',m.hip,'سم'],['الصدر',m.chest,'سم'],['الذراع',m.arm,'سم'],['الفخذ',m.thigh,'سم']].filter(([,v])=>v).map(([l,v,u])=>`
            <div style="background:#0d2b1f;border-radius:8px;padding:8px 10px;">
              <div style="font-size:11px;color:var(--muted);">${l}</div>
              <div style="font-size:16px;font-weight:700;color:var(--green);">${v} ${u}</div>
            </div>`).join('')}
        </div>
      </div>`).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════

function toggleCheck(key) {
  const t=getToday();
  if(key==='water') return;
  updateToday({[key]:!t[key]});
  checkCompletion();
}

function toggleMealDone(key, label) {
  const t=getToday();
  updateToday({[key]:!t[key]});
  if(!t[key]) showToast('✅ '+label+' — تم! 🌿','#4ade80');
  checkCompletion();
}

function toggleEx(name) {
  const t=getToday();
  const arr=Array.isArray(t.exercise)?t.exercise:[];
  const next=arr.includes(name)?arr.filter(x=>x!==name):[...arr,name];
  updateToday({exercise:next});
}

function setWater(val) { updateToday({water:val}); checkCompletion(); }
function setExNote(val) { D[todayKey()]={...getToday(),exNote:val}; saveData(D); }
function toggleDay(n) { openDays[n]=!openDays[n]; render(); }
function nextMot() { motIdx=(motIdx+1)%MOTIVATIONS.length; render(); }

function checkCompletion() {
  const t=getToday();
  const w=t.water||0;
  if(t.breakfast&&t.lunch&&t.dinner&&w>=WATER_GOAL&&!t.completed){
    D[todayKey()]={...t,completed:true}; saveData(D);
  }
}

// ═══════════════════════════════════════════════════
// SHARE REPORTS
// ═══════════════════════════════════════════════════

function buildReport(type, dayNum) {
  const t=getToday();
  const weights=D._weights||[];
  const lw=weights.length?weights[weights.length-1].weight:START_WEIGHT;
  const lost=Math.max(0,+(START_WEIGHT-lw).toFixed(1));
  const toGo=Math.max(0,+(lw-GOAL_WEIGHT).toFixed(1));
  const pct=Math.min(100,Math.round((lost/TOTAL_TO_LOSE)*100));
  const streak=getStreak();
  const date=new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  if(type==='exercise'){
    const done=Array.isArray(t.exercise)?t.exercise:[];
    const exText=done.length?done.map(n=>`  ✅ ${n}`).join('\n'):'  ❌ لم تُسجَّل رياضة';
    return `🌿 تقرير رياضة ماجدة
📅 ${date}
${'─'.repeat(26)}

🏃‍♀️ الرياضة اليوم:
${exText}
${t.exNote?'\n📝 '+t.exNote:''}

⚖️ الوزن الحالي: ${lw} كغ
📉 خسرتِ: ${lost} كغ حتى الآن

${'─'.repeat(26)}
👩‍⚕️ د. ميرنا • +963 991 863 344`.trim();
  }

  if(type==='meal'&&dayNum){
    const plan=PLAN.find(d=>d.day===dayNum);
    if(!plan) return '';
    return `🌿 وجبات ماجدة — اليوم ${dayNum}
📅 ${date}
${'─'.repeat(26)}

🌅 الفطور:
${(plan.breakfast||[]).map(i=>'  • '+i).join('\n')}
  ${t.breakfast?'✅ تم الأكل':'⭕ لم يُسجَّل'}

🍬 سناك 1:
${(plan.snack1||[]).map(i=>'  • '+i).join('\n')}
  ${t.snack1?'✅ تم':'⭕ لم يُسجَّل'}

☀️ الغداء:
${(plan.lunch||[]).map(i=>'  • '+i).join('\n')}
  ${t.lunch?'✅ تم الأكل':'⭕ لم يُسجَّل'}

🍬 سناك 2:
${(plan.snack2||[]).map(i=>'  • '+i).join('\n')}
  ${t.snack2?'✅ تم':'⭕ لم يُسجَّل'}

🌙 العشاء:
${(plan.dinner||[]).map(i=>'  • '+i).join('\n')}
  ${t.dinner?'✅ تم الأكل':'⭕ لم يُسجَّل'}

${'─'.repeat(26)}
👩‍⚕️ د. ميرنا • +963 991 863 344`.trim();
  }

  // Full daily report
  const checks=[
    ['🌅 الفطور', t.breakfast],
    ['🍬 السناك الأول', t.snack1],
    ['☀️ الغداء', t.lunch],
    ['🍬 السناك الثاني', t.snack2],
    ['🌙 العشاء', t.dinner],
    ['🚶‍♀️ المشي 45 دقيقة', Array.isArray(t.exercise)&&t.exercise.length>0],
    ['💧 الماء ('+(t.water||0)+'/'+WATER_GOAL+' أكواب)', (t.water||0)>=WATER_GOAL],
    ['🥗 سلطة مع الغداء', t.salad],
    ['🌙 النوم قبل منتصف الليل', t.sleep],
  ];
  const done=checks.filter(c=>c[1]).length;
  const exNames=Array.isArray(t.exercise)&&t.exercise.length?t.exercise.join('، '):'لا شيء';
  return `🌿 تقرير ماجدة اليومي
📅 ${date}
${'─'.repeat(28)}

📊 الإحصائيات:
  ⚖️ الوزن: ${lw} كغ
  📉 خسرتِ: ${lost} كغ
  🎯 الهدف الباقي: ${toGo} كغ
  📈 التقدم: ${pct}% من الهدف
  🔥 سلسلة: ${streak} يوم متتالي

${'─'.repeat(28)}
✅ إنجازات اليوم (${done}/9):

${checks.map(([l,v])=>`  ${v?'✅':'❌'} ${l}`).join('\n')}

🚶‍♀️ الرياضة: ${exNames}
${t.exNote?'📝 '+t.exNote:''}

${'─'.repeat(28)}
${done===9?'🎉 يوم مثالي يا ماجدة! أنتِ رائعة! 🌟':done>=6?'💚 يوم جيد جداً! استمري!':'🌿 غداً أحسن، لا تستسلمي!'}

👩‍⚕️ د. ميرنا • +963 991 863 344`.trim();
}

function openShareFull() { openShare(buildReport('full')); }
function shareMeal(dayNum) { openShare(buildReport('meal',dayNum)); }
function shareExercise() { openShare(buildReport('exercise')); }

function openShare(report) {
  document.getElementById('shareReport').textContent=report;
  const enc=encodeURIComponent(report);
  document.getElementById('whatsappBtn').href=`https://wa.me/963991863344?text=${enc}`;
  document.getElementById('shareModal').classList.remove('hidden');
}
function closeShareModal() { document.getElementById('shareModal').classList.add('hidden'); }
function handleShareOverlay(e) { if(e.target.id==='shareModal') closeShareModal(); }
function copyReport() {
  const text=document.getElementById('shareReport').textContent;
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>showToast('✅ تم النسخ! 🌿','#4ade80'));
  else { const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('✅ تم النسخ!','#4ade80'); }
}

function showToast(msg,color) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color||'#4ade80';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

// ═══════════════════════════════════════════════════
// WEIGHT & MEASURE MODALS
// ═══════════════════════════════════════════════════

function openWeightModal() { document.getElementById('weightModal').classList.remove('hidden'); }
function closeWeightModal() { document.getElementById('weightModal').classList.add('hidden'); document.getElementById('weightInput').value=''; }
function logWeight() {
  const w=parseFloat(document.getElementById('weightInput').value);
  if(!w||w<30||w>300) return;
  const ws=D._weights||[];
  D._weights=[...ws,{date:todayKey(),weight:w}].slice(-30);
  saveData(D); closeWeightModal(); render();
}

function openMeasureModal() {
  const fields=[['weight','الوزن (كغ)','87.4'],['waist','محيط الخصر (سم)',''],['hip','محيط الورك (سم)',''],['chest','محيط الصدر (سم)',''],['arm','محيط الذراع (سم)',''],['thigh','محيط الفخذ (سم)','']];
  document.getElementById('measureFields').innerHTML=fields.map(([k,l,p])=>`<div style="margin-bottom:10px;"><div style="font-size:12px;color:var(--muted);margin-bottom:4px;text-align:right;">${l}</div><input type="number" id="m_${k}" placeholder="${p}" style="width:100%;background:#0d2b1f;border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;text-align:right;outline:none;" step="0.1"></div>`).join('');
  document.getElementById('measureModal').classList.remove('hidden');
}
function closeMeasureModal() { document.getElementById('measureModal').classList.add('hidden'); }
function logMeasurement() {
  const keys=['weight','waist','hip','chest','arm','thigh'];
  const entry={date:todayKey()};
  keys.forEach(k=>{const el=document.getElementById('m_'+k);if(el&&el.value)entry[k]=el.value;});
  const ms=D._measurements||[];
  D._measurements=[...ms,entry].slice(-20);
  saveData(D); closeMeasureModal(); render();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════

setInterval(()=>{ tipIdx=(tipIdx+1)%TIPS.length; if(currentTab==='home') render(); },9000);
render();
